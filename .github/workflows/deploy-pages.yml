name: Deploy docs to GitHub Pages

# Dual-hosting note: this repo ships BOTH a Firebase Hosting config (firebase.json
# + .firebaserc, project "empora-for-woocommerce-docs") AND this GitHub Pages
# workflow. They both target empora-docs.aoneahsan.com via the static/CNAME file —
# point DNS at whichever host you make live. Run ONE of them as the production host.
#
# This workflow builds the Docusaurus site and publishes it to GitHub Pages.
# Enable it in repo Settings → Pages → "Build and deployment" → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
